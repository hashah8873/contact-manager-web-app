<!-- LOGIN -->
<div *ngIf="!isLoggedIn" class="login-box">

  <h2>Login</h2>

  <input placeholder="Email" [(ngModel)]="loginData.email">
  <input type="password" placeholder="Password" [(ngModel)]="loginData.password">

  <button (click)="login()">Login</button>

</div>


<!-- MAIN APP -->
<div *ngIf="isLoggedIn">

<h1>Contact Manager System</h1>

<div class="top-buttons">
  <button (click)="logout()">Logout</button>
  <button (click)="addContact()">
    {{ editingId ? 'Update Contact' : 'Add Contact' }}
  </button>
  <button (click)="exportCSV()">Export CSV</button>
</div>

<div class="cards">
  <div class="card-box">
    <h2>{{contacts.length}}</h2>
    <p>Total Contacts</p>
  </div>
  <div class="card-box">
    <h2>{{categories.length}}</h2>
    <p>Total Categories</p>
  </div>
</div>

<div class="form-container">
  <input placeholder="Name" [(ngModel)]="newContact.name">
  <input placeholder="Email" [(ngModel)]="newContact.email">
  <input placeholder="Phone" [(ngModel)]="newContact.phone">

  <select [(ngModel)]="newContact.category_id">
    <option value="">Select Category</option>
    <option *ngFor="let c of categories" [value]="c.category_id">
      {{c.category_name}}
    </option>
  </select>

  <input type="file" (change)="onFileChange($event)">
</div>

<div class="search-filter-container">
  <select [(ngModel)]="selectedCategory">
    <option value="">All Categories</option>
    <option *ngFor="let c of categories" [value]="c.category_name">
      {{c.category_name}}
    </option>
  </select>

  <input placeholder="Search..." [(ngModel)]="searchText">
</div>

<div *ngIf="message" class="toast">
  {{message}}
</div>

<table>
<tr>
<th>ID</th>
<th>Image</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Category</th>
<th>Action</th>
</tr>

<tr *ngFor="let c of filteredContacts()">

<td>{{c.id}}</td>

<td>
<img *ngIf="c.image_path"
[src]="'http://localhost/contact-manager-web-app/' + c.image_path">
</td>

<td>{{c.name}}</td>
<td>{{c.email}}</td>
<td>{{c.phone}}</td>
<td>{{c.category_name}}</td>

<td>
<button (click)="editContact(c)">Edit</button>
<button (click)="deleteContact(c.id)">Delete</button>
</td>

</tr>
</table>

</div>
